<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join LearnLoop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Shared Styles from main template */
        :root { --bg: #ffffff; --text: #111; --border: #e8e8e8; --muted: #888; --accent: #111; }
        body.dark { --bg: #0a0a0a; --text: #f0f0f0; --border: #2a2a2a; --muted: #666; --accent: #f0f0f0; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.3s; }

        .auth-container { width: 100%; max-width: 400px; padding: 40px 24px; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 900; margin-bottom: 32px; display: block; text-decoration: none; color: var(--text); }
        h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
        p.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

        /* Forms */
        form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        input { padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: inherit; font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--text); }

        /* Buttons */
        .btn-primary { padding: 14px; border-radius: 999px; background: var(--accent); color: var(--bg); border: none; font-weight: 700; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .divider { margin: 24px 0; position: relative; text-align: center; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); z-index: 1; }
        .divider span { position: relative; z-index: 2; background: var(--bg); padding: 0 12px; color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }

        /* Social Auth */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .btn-social { padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-social:hover { background: rgba(0,0,0,0.05); }
        body.dark .btn-social:hover { background: rgba(255,255,255,0.05); }

        /* Utility */
        .toggle-link { margin-top: 24px; font-size: 0.9rem; color: var(--muted); }
        .toggle-link span { color: var(--text); font-weight: 600; cursor: pointer; }
        .forgot-pass { font-size: 0.8rem; color: var(--muted); text-align: right; cursor: pointer; }
        .hidden { display: none !important; }

        /* OTP/Phone specifics */
        #phone-section, #otp-section { display: flex; flex-direction: column; gap: 12px; }

        /* Theme toggle button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            z-index: 100;
        }
        .theme-toggle:hover { background: var(--border); transform: scale(1.1); }
    </style>
</head>
<body>

<!-- Theme toggle -->
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="auth-container">
    <a href="home.html" class="logo">🎓 LearnLoop</a>

    <!-- Header Text -->
    <div id="auth-header">
        <h2 id="auth-title">Welcome back</h2>
        <p class="subtitle" id="auth-subtitle">Log in to continue your study journey.</p>
    </div>

    <!-- Social Logins -->
    <div class="social-grid">
        <!-- Google Button Updated with Chrome/Google Logo -->
        <button class="btn-social" id="google-login-btn">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="18" height="18" alt="Google">  Google
        </button>
        <button class="btn-social" id="facebook-login-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook
        </button>
    </div>

    <div class="divider"><span>Or use email</span></div>

    <!-- Main Auth Form -->
    <form id="main-auth-form">
        <div class="input-group" id="name-group" class="hidden">
            <label>Full Name</label>
            <input type="text" placeholder="Aisha Rahman" id="user-name">
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="name@example.com" id="user-email" required>
        </div>

        <div class="input-group" id="pass-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" id="user-password">
            <div class="forgot-pass" onclick="showForgetPassword()">Forgot password?</div>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
    </form>

    <!-- Phone Authentication Section (Optional/Alternative) -->
    <div class="divider"><span>Or Mobile</span></div>
    <div id="phone-section">
        <input type="tel" placeholder="+1 (555) 000-0000" id="phone-number">
        <button class="btn-social" id="send-otp-btn" style="width:100%">Send OTP via SMS</button>
    </div>

    <div id="otp-section" class="hidden">
        <p class="subtitle">Enter the 6-digit code sent to your phone.</p>
        <input type="text" placeholder="000000" maxlength="6" id="otp-code">
        <button class="btn-primary" id="verify-otp-btn">Verify & Login</button>
        <div id="recaptcha-container"></div>
    </div>

    <!-- Toggle between Login/Signup -->
    <div class="toggle-link" id="toggle-text">
        Don't have an account? <span onclick="toggleAuth(true)">Sign up</span>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    // Import Firebase modules
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { 
        getAuth, 
        signInWithPopup, 
        GoogleAuthProvider, 
        FacebookAuthProvider,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
        RecaptchaVerifier,
        signInWithPhoneNumber
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // Your Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC0SlrLGv9luVqaogkW4lpYL3mwIxxvSdA",
        authDomain: "learnloop-f89c2.firebaseapp.com",
        projectId: "learnloop-f89c2",
        storageBucket: "learnloop-f89c2.firebasestorage.app",
        messagingSenderId: "777914976314",
        appId: "1:777914976314:web:2cd051169684c24caf8d03",
        measurementId: "G-3SBVP21TE7"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // ── Theme: read from localStorage (shared with index.html / profile.html) ──
    const SUN  = document.getElementById('theme-icon-sun');
    const MOON = document.getElementById('theme-icon-moon');

    function applyTheme(dark) {
        document.body.classList.toggle('dark', dark);
        SUN.style.display  = dark ? 'block' : 'none';
        MOON.style.display = dark ? 'none'  : 'block';
        localStorage.setItem('ll_theme', dark ? 'dark' : 'light');
    }

    // On load: respect whatever the dashboard last saved, fall back to system pref
    const saved = localStorage.getItem('ll_theme');
    if (saved) {
        applyTheme(saved === 'dark');
    } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
        applyTheme(!document.body.classList.contains('dark'));
    });

    let isSignUp = false;
    let recaptchaVerifier;
    let confirmationResult;

    window.toggleAuth = function(signUp) {
        isSignUp = signUp;
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const nameGroup = document.getElementById('name-group');
        const toggleText = document.getElementById('toggle-text');

        if (isSignUp) {
            title.innerText = "Create an account";
            subtitle.innerText = "Start tracking your study sessions today.";
            submitBtn.innerText = "Create Account";
            nameGroup.style.display = "flex";
            toggleText.innerHTML = 'Already have an account? <span onclick="toggleAuth(false)">Log in</span>';
        } else {
            title.innerText = "Welcome back";
            subtitle.innerText = "Log in to continue your study journey.";
            submitBtn.innerText = "Sign In";
            nameGroup.style.display = "none";
            toggleText.innerHTML = 'Don\'t have an account? <span onclick="toggleAuth(true)">Sign up</span>';
        }
    }

    window.showForgetPassword = async function() {
        const email = document.getElementById('user-email').value;
        if(!email) {
            alert("Please enter your email address first.");
            return;
        }
        
        try {
            await sendPasswordResetEmail(auth, email);
            alert("Password reset link sent to: " + email);
        } catch (error) {
            console.error("Password reset error:", error);
            alert("Error sending password reset email: " + error.message);
        }
    }

    // Google Login
    document.getElementById('google-login-btn').addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            console.log("Google login successful:", result.user);
            alert("Welcome " + result.user.displayName + "!");
            window.location.href = "index.html"; // Redirect to home page
        } catch (error) {
            console.error("Google login error:", error);
            alert("Google login failed: " + error.message);
        }
    });

    // Facebook Login
    document.getElementById('facebook-login-btn').addEventListener('click', async () => {
        const provider = new FacebookAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            console.log("Facebook login successful:", result.user);
            alert("Welcome " + result.user.displayName + "!");
            window.location.href = "index.html"; // Redirect to home page
        } catch (error) {
            console.error("Facebook login error:", error);
            alert("Facebook login failed: " + error.message);
        }
    });

    // Email/Password Authentication
    document.getElementById('main-auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('user-email').value;
        const password = document.getElementById('user-password').value;
        const name = document.getElementById('user-name').value;

        try {
            if (isSignUp) {
                // Sign up
                const result = await createUserWithEmailAndPassword(auth, email, password);
                console.log("Sign up successful:", result.user);
                alert("Account created successfully! Welcome " + (name || email) + "!");
                window.location.href = "index.html";
            } else {
                // Sign in
                const result = await signInWithEmailAndPassword(auth, email, password);
                console.log("Sign in successful:", result.user);
                alert("Welcome back!");
                window.location.href = "index.html";
            }
        } catch (error) {
            console.error("Authentication error:", error);
            alert("Authentication failed: " + error.message);
        }
    });

    // Phone Authentication - Send OTP
    document.getElementById('send-otp-btn').addEventListener('click', async () => {
        const phoneNumber = document.getElementById('phone-number').value;
        if (!phoneNumber) {
            alert("Please enter a phone number");
            return;
        }

        try {
            // Initialize reCAPTCHA
            if (!recaptchaVerifier) {
                recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'invisible',
                    'callback': (response) => {
                        console.log("reCAPTCHA solved");
                    }
                });
            }

            confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
            console.log("OTP sent successfully");
            document.getElementById('phone-section').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
        } catch (error) {
            console.error("Error sending OTP:", error);
            alert("Failed to send OTP: " + error.message);
        }
    });

    // Phone Authentication - Verify OTP
    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
        const code = document.getElementById('otp-code').value;
        if (!code) {
            alert("Please enter the OTP code");
            return;
        }

        try {
            const result = await confirmationResult.confirm(code);
            console.log("Phone authentication successful:", result.user);
            alert("Phone verification successful! Welcome!");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Error verifying OTP:", error);
            alert("Invalid OTP code: " + error.message);
        }
    });

    // Initialize hidden state
    document.getElementById('name-group').style.display = "none";
</script>

</body>
</html>
