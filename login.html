<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join LearnLoop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables & Base Styles */
        :root { --bg: #ffffff; --text: #111; --border: #e8e8e8; --muted: #888; --accent: #111; --error: #ff4d4d; }
        body.dark { --bg: #0a0a0a; --text: #f0f0f0; --border: #2a2a2a; --muted: #666; --accent: #f0f0f0; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.3s; }

        .auth-container { width: 100%; max-width: 400px; padding: 40px 24px; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 900; margin-bottom: 32px; display: block; text-decoration: none; color: var(--text); cursor: pointer; }
        h2 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px; }
        p.subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

        /* Screen Visibility Logic */
        .auth-screen { display: none; animation: fadeIn 0.3s ease-in-out; }
        .auth-screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms & Inputs */
        form { display: flex; flex-direction: column; gap: 12px; text-align: left; }
        .input-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; text-align: left; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        input { padding: 12px 16px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: inherit; font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--text); }
        input.invalid { border-color: var(--error); }

        /* Buttons */
        .btn-primary { width: 100%; padding: 14px; border-radius: 999px; background: var(--accent); color: var(--bg); border: none; font-weight: 700; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        
        .btn-social { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-weight: 600; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; margin-top: 10px; }
        
        .divider { margin: 24px 0; position: relative; text-align: center; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--border); z-index: 1; }
        .divider span { position: relative; z-index: 2; background: var(--bg); padding: 0 12px; color: var(--muted); font-size: 0.75rem; font-weight: 600; text-transform: uppercase; }

        .forgot-pass { font-size: 0.8rem; color: var(--muted); text-align: right; cursor: pointer; margin-top: 4px; }
        .toggle-link { margin-top: 24px; font-size: 0.9rem; color: var(--muted); }
        .toggle-link span { color: var(--text); font-weight: 600; cursor: pointer; }
        
        .otp-display-text { font-weight: 700; color: var(--text); }
        .back-link { margin-top: 16px; display: block; font-size: 0.85rem; color: var(--muted); cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="logo" onclick="showScreen('login-screen')">🎓 LearnLoop</div>

    <!-- SCREEN 1: LOGIN -->
    <div id="login-screen" class="auth-screen active">
        <h2 id="auth-title">Welcome back</h2>
        <p class="subtitle" id="auth-subtitle">Log in to continue your study journey.</p>

        <div class="social-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button class="btn-social">
                <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="18" height="18" alt="Google"> Google
            </button>
            <button class="btn-social">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook
            </button>
        </div>

        <div class="divider"><span>Or use Mobile</span></div>

        <form id="login-form" onsubmit="event.preventDefault(); sendLoginOTP();">
            <div class="input-group">
                <label>Phone Number</label>
                <input type="tel" id="login-phone" placeholder="0763110219" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="0763110219">
                <div class="forgot-pass" onclick="showScreen('forgot-screen')">Forgot password?</div>
            </div>
            <button type="submit" class="btn-primary">Send OTP</button>
        </form>

        <div class="toggle-link">
            Don't have an account? <span onclick="alert('Signup logic would go here')">Sign up</span>
        </div>
    </div>

    <!-- SCREEN 2: OTP VERIFICATION -->
    <div id="otp-screen" class="auth-screen">
        <h2>Verify code</h2>
        <p class="subtitle">We sent a code to <span id="target-phone" class="otp-display-text"></span></p>
        
        <form onsubmit="event.preventDefault(); verifyLogin();">
            <div class="input-group">
                <label>Enter 6-digit OTP</label>
                <input type="text" id="otp-input" placeholder="000000" maxlength="6" pattern="\d{6}" required>
            </div>
            <button type="submit" class="btn-primary">Verify & Login</button>
        </form>
        <span class="back-link" onclick="showScreen('login-screen')">Change phone number</span>
    </div>

    <!-- SCREEN 3: FORGOT PASSWORD (UI ONLY) -->
    <div id="forgot-screen" class="auth-screen">
        <h2>Reset Password</h2>
        <p class="subtitle">Enter your details to receive a recovery code.</p>
        
        <form onsubmit="event.preventDefault(); handleForgotRequest();">
            <div class="input-group">
                <label>Email or Mobile Number</label>
                <input type="text" id="forgot-id" placeholder="0763110219" required>
            </div>
            <button type="submit" class="btn-primary">Send OTP</button>
        </form>
        <span class="back-link" onclick="showScreen('login-screen')">Back to Login</span>
    </div>

</div>

<script>
    // Navigation Utility
    function showScreen(screenId) {
        document.querySelectorAll('.auth-screen').forEach(screen => {
            screen.classList.remove('active');
        });
        document.getElementById(screenId).classList.add('active');
    }

    // Logic for Login -> OTP
    function sendLoginOTP() {
        const phone = document.getElementById('login-phone').value;
        
        // Basic Phone Validation
        if (phone.length < 7) {
            alert("Please enter a valid phone number.");
            return;
        }

        // UI Transition
        document.getElementById('target-phone').innerText = phone;
        console.log("Integrating Backend: Call OTP API here for " + phone);
        
        showScreen('otp-screen');
    }

    // Logic for OTP Verification
    function verifyLogin() {
        const otp = document.getElementById('otp-input').value;
        
        if (otp.length === 6) {
            alert("Login Successful!");
            window.location.href = "index.html"; // Redirect to main app
        } else {
            alert("Please enter a 6-digit code.");
        }
    }

    // Logic for Forgot Password (UI Only)
    function handleForgotRequest() {
        const id = document.getElementById('forgot-id').value;
        alert("OTP Request sent to: " + id + "\n(Backend functionality to be integrated later)");
        showScreen('login-screen');
    }

    // Dark Mode Initialization
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.body.classList.add('dark');
    }
</script>

</body>
</html>
