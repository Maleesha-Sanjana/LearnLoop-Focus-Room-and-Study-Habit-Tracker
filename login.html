<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join LearnLoop</title>
    <link rel="icon" href="assets/logo.png" type="image/png"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css"/>
</head>
<body>

<!-- Theme toggle -->
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
    <svg id="theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>

<div class="auth-container">
    <a href="index.html" class="logo"><img src="assets/logo.png" alt="LearnLoop"/></a>

    <!-- Header Text -->
    <div id="auth-header">
        <h2 id="auth-title">Welcome back</h2>
        <p class="subtitle" id="auth-subtitle">Log in to continue your study journey.</p>
    </div>

    <!-- Social Logins -->
    <div class="social-grid">
        <button class="btn-social" id="google-login-btn">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="18" height="18" alt="Google">  Google
        </button>
    </div>

    <div class="divider"><span>Or use email</span></div>

    <!-- Main Auth Form -->
    <form id="main-auth-form">
        <div class="input-group hidden" id="name-group">
            <label for="userName">UserName</label>
            <input type="text" name="UserName" id="userName" placeholder="Enter your username" autocomplete="username">
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="name@example.com" id="user-email" required>
        </div>

        <div class="input-group" id="pass-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" id="user-password">
            <div class="forgot-pass" onclick="showForgetPassword()">Forgot password?</div>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
    </form>

    <!-- Phone Authentication Section (Optional/Alternative) -->
    <div class="divider"><span>Or Mobile</span></div>
    <div id="phone-section">
        <input type="tel" placeholder="+94 77 123 4567" id="phone-number">
        <button class="btn-social" id="send-otp-btn" style="width:100%">Send OTP via SMS</button>
    </div>

    <div id="otp-section" class="hidden">
        <p class="subtitle">Enter the 6-digit code sent to your phone.</p>
        <input type="text" placeholder="000000" maxlength="6" id="otp-code">
        <button class="btn-primary" id="verify-otp-btn">Verify & Login</button>
        <div id="recaptcha-container"></div>
    </div>

    <!-- Toggle between Login/Signup -->
    <div class="toggle-link" id="toggle-text">
        Don't have an account? <span onclick="toggleAuth(true)">Sign up</span>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
    // Import Firebase modules
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { 
        getAuth, 
        onAuthStateChanged,
        signInWithPopup, 
        GoogleAuthProvider, 
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
        updateProfile,
        RecaptchaVerifier,
        signInWithPhoneNumber
    } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getFirestore, doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    // Your Firebase configuration
    const firebaseConfig = {
        apiKey: "AIzaSyC0SlrLGv9luVqaogkW4lpYL3mwIxxvSdA",
        authDomain: "learnloop-f89c2.firebaseapp.com",
        projectId: "learnloop-f89c2",
        storageBucket: "learnloop-f89c2.firebasestorage.app",
        messagingSenderId: "777914976314",
        appId: "1:777914976314:web:2cd051169684c24caf8d03",
        measurementId: "G-3SBVP21TE7"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function saveUserToDatabase(user, userName) {
        const resolvedName = (userName || user.displayName || user.email?.split('@')[0] || 'User').trim();
        await setDoc(doc(db, 'users', user.uid), {
            userName: resolvedName,
            email: user.email || '',
            photoURL: user.photoURL || null,
            updatedAt: serverTimestamp()
        }, { merge: true });
        return resolvedName;
    }

    // If already logged in, skip the login page entirely
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "index.html";
    });

    // ── Error display (replaces alert) ──
    function showError(msg) {
        let el = document.getElementById('auth-error');
        if (!el) {
            el = document.createElement('p');
            el.id = 'auth-error';
            el.style.cssText = 'color:#e53e3e;font-size:.85rem;margin-top:8px;text-align:center;';
            document.querySelector('.auth-container').appendChild(el);
        }
        el.textContent = msg;
        setTimeout(() => { el.textContent = ''; }, 4000);
    }

    // ── Theme: read from localStorage (shared with index.html / profile.html) ──
    const SUN  = document.getElementById('theme-icon-sun');
    const MOON = document.getElementById('theme-icon-moon');

    function applyTheme(dark) {
        document.body.classList.toggle('dark', dark);
        SUN.style.display  = dark ? 'block' : 'none';
        MOON.style.display = dark ? 'none'  : 'block';
        localStorage.setItem('ll_theme', dark ? 'dark' : 'light');
    }

    // On load: respect whatever the dashboard last saved, fall back to system pref
    const saved = localStorage.getItem('ll_theme');
    if (saved) {
        applyTheme(saved === 'dark');
    } else {
        applyTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    document.getElementById('theme-toggle').addEventListener('click', () => {
        applyTheme(!document.body.classList.contains('dark'));
    });

    let isSignUp = false;
    let recaptchaVerifier;
    let confirmationResult;

    window.toggleAuth = function(signUp) {
        isSignUp = signUp;
        const title = document.getElementById('auth-title');
        const subtitle = document.getElementById('auth-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const nameGroup = document.getElementById('name-group');
        const toggleText = document.getElementById('toggle-text');

        if (isSignUp) {
            title.innerText = "Create an account";
            subtitle.innerText = "Start tracking your study sessions today.";
            submitBtn.innerText = "Create Account";
            nameGroup.classList.remove('hidden');
            toggleText.innerHTML = 'Already have an account? <span onclick="toggleAuth(false)">Log in</span>';
        } else {
            title.innerText = "Welcome back";
            subtitle.innerText = "Log in to continue your study journey.";
            submitBtn.innerText = "Sign In";
            nameGroup.classList.add('hidden');
            toggleText.innerHTML = 'Don\'t have an account? <span onclick="toggleAuth(true)">Sign up</span>';
        }
    }

    window.showForgetPassword = async function() {
        const email = document.getElementById('user-email').value;
        if(!email) {
            alert("Please enter your email address first.");
            return;
        }
        
        try {
            await sendPasswordResetEmail(auth, email);
            alert("Password reset link sent to: " + email);
        } catch (error) {
            console.error("Password reset error:", error);
            alert("Error sending password reset email: " + error.message);
        }
    }

    // Google Login
    document.getElementById('google-login-btn').addEventListener('click', async () => {
        const provider = new GoogleAuthProvider();
        try {
            const result = await signInWithPopup(auth, provider);
            await saveUserToDatabase(result.user);
            console.log("Google login successful:", result.user);
            window.location.href = "index.html";
        } catch (error) {
            console.error("Google login error:", error);
            showError("Google login failed: " + error.message);
        }
    });

    // Email/Password Authentication
    document.getElementById('main-auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('user-email').value.trim();
        const password = document.getElementById('user-password').value;
        const userName = document.getElementById('userName').value.trim();

        try {
            if (isSignUp) {
                if (!userName) {
                    showError("Please enter your UserName.");
                    return;
                }
                const result = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(result.user, { displayName: userName });
                await saveUserToDatabase(result.user, userName);
                console.log("Sign up successful:", result.user);
                window.location.href = "index.html";
            } else {
                const result = await signInWithEmailAndPassword(auth, email, password);
                await saveUserToDatabase(result.user);
                console.log("Sign in successful:", result.user);
                window.location.href = "index.html";
            }
        } catch (error) {
            console.error("Authentication error:", error);
            showError(error.message);
        }
    });

    // Phone Authentication - Send OTP
    document.getElementById('send-otp-btn').addEventListener('click', async () => {
        const phoneNumber = document.getElementById('phone-number').value;
        if (!phoneNumber) {
            showError("Please enter a phone number");
            return;
        }

        try {
            if (!recaptchaVerifier) {
                recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                    'size': 'invisible',
                    'callback': (response) => { console.log("reCAPTCHA solved"); }
                });
            }
            confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptchaVerifier);
            document.getElementById('phone-section').classList.add('hidden');
            document.getElementById('otp-section').classList.remove('hidden');
        } catch (error) {
            console.error("Error sending OTP:", error);
            showError("Failed to send OTP: " + error.message);
        }
    });

    // Phone Authentication - Verify OTP
    document.getElementById('verify-otp-btn').addEventListener('click', async () => {
        const code = document.getElementById('otp-code').value;
        if (!code) {
            showError("Please enter the OTP code");
            return;
        }

        try {
            const result = await confirmationResult.confirm(code);
            await saveUserToDatabase(result.user);
            console.log("Phone authentication successful:", result.user);
            window.location.href = "index.html";
        } catch (error) {
            console.error("Error verifying OTP:", error);
            showError("Invalid OTP code: " + error.message);
        }
    });

</script>

</body>
</html>
