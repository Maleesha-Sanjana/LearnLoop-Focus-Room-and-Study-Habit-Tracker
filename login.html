<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join LearnLoop</title>
    <link rel="icon" href="assets/logo.png" type="image/png"/>
    <link rel="stylesheet" href="css/login.css"/>
    <script>
      if (new URLSearchParams(location.search).get('mode') === 'signup' || location.hash === '#signup') {
        document.documentElement.classList.add('auth-signup');
      }
    </script>
</head>
<body>

<!-- Back -->
<a href="index.html" class="back-home">Back</a>

<!-- Theme -->
<button type="button" class="theme-toggle" id="theme-toggle">Dark</button>

<div class="auth-container">
    <a href="index.html" class="logo"><img src="assets/logo.png" alt="LearnLoop"/></a>

    <!-- Header -->
    <div id="auth-header">
        <h2 id="auth-title">Welcome back</h2>
        <p class="subtitle" id="auth-subtitle">Log in to continue your study journey.</p>
    </div>

    <!-- Google -->
    <div class="social-grid">
        <button class="btn-social" id="google-login-btn">
            <img src="https://www.gstatic.com/images/branding/product/1x/googleg_48dp.png" width="18" height="18" alt="Google">  Google
        </button>
    </div>

    <div class="divider"><span>Or use email</span></div>

    <!-- Email form -->
    <form id="main-auth-form">
        <div class="input-group hidden" id="name-group">
            <label for="userName">UserName</label>
            <input type="text" name="UserName" id="userName" placeholder="Enter your username" autocomplete="username">
        </div>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" placeholder="name@example.com" id="user-email" required>
        </div>

        <div class="input-group" id="pass-group">
            <label>Password</label>
            <input type="password" placeholder="••••••••" id="user-password">
            <div class="forgot-pass" onclick="showForgetPassword()">Forgot password?</div>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Sign In</button>
    </form>

    <!-- Phone OTP -->
    <div class="divider"><span>Or Mobile</span></div>
    <div id="phone-section">
        <input type="tel" placeholder="+94 78 636 0508" id="phone-number">
        <div id="recaptcha-container"></div>
        <button class="btn-social btn-full" id="send-otp-btn">Send OTP via SMS</button>
    </div>

    <div id="otp-section" class="hidden">
        <p class="subtitle" id="otp-sent-msg">Enter the 6-digit code sent to your phone.</p>
        <input type="text" placeholder="000000" maxlength="6" id="otp-code" inputmode="numeric" autocomplete="one-time-code">
        <button class="btn-primary" id="verify-otp-btn">Verify & Login</button>
        <button type="button" class="btn-social btn-full" id="change-phone-btn">Use a different number</button>
    </div>

    <!-- Login / signup toggle -->
    <div class="toggle-link" id="toggle-text">
        Don't have an account? <span onclick="toggleAuth(true)">Sign up</span>
    </div>
</div>

<script>
  if (document.documentElement.classList.contains('auth-signup')) {
    document.getElementById('auth-title').textContent = 'Create an account';
    document.getElementById('auth-subtitle').textContent = 'Start tracking your study sessions today.';
    document.getElementById('submit-btn').textContent = 'Create Account';
    document.getElementById('name-group').classList.remove('hidden');
    document.getElementById('toggle-text').innerHTML = 'Already have an account? <span onclick="toggleAuth(false)">Log in</span>';
  }
</script>

<script type="module" src="js/login.js?v=4"></script>

</body>
</html>
