    async function clearDemoCollection(colName, demoField = 'demo') {
      const snap = await getDocs(query(collection(db, colName), where(demoField, '==', true)));
      const batchSize = 400;
      for (let i = 0; i < snap.docs.length; i += batchSize) {
        const batch = writeBatch(db);
        snap.docs.slice(i, i + batchSize).forEach(d => batch.delete(d.ref));
        await batch.commit();
      }
      return snap.size;
    }

    async function commitBatch(ops) {
      const batchSize = 400;
      for (let i = 0; i < ops.length; i += batchSize) {
        const batch = writeBatch(db);
        ops.slice(i, i + batchSize).forEach(fn => fn(batch));
        await batch.commit();
      }
    }

    async function runSeed() {
      logEl.textContent = '';
      btn.disabled = true;

      await auth.authStateReady();
      if (!auth.currentUser) {
        log('Please log in first: login.html');
        logEl.className = 'log err';
        btn.disabled = false;
        return;
      }

      try {
        log('Clearing old demo data…');
        await clearDemoCollection('quizResults');
        await clearDemoCollection('sessions');
        await clearDemoCollection('testimonials');

        log('Writing platform stats…');
        await setDoc(doc(db, 'platformStats', 'global'), {
          studentCount: 1180,
          sessionCount: 7420,
          goalsCompletedCount: 286,
          demo: true,
          updatedAt: serverTimestamp()
        });

        log('Writing quiz questions…');
        await setDoc(doc(db, 'quizSets', 'default'), {
          questions: QUIZ_QUESTIONS,
          updatedAt: serverTimestamp()
        });

        log('Writing individual leaderboard…');
        const quizOps = [];
        for (const p of LEADERBOARD) {
          const perQuiz = Math.round(p.score / p.quizzes);
          for (let i = 0; i < p.quizzes; i++) {
            const ref = doc(collection(db, 'quizResults'));
            quizOps.push(batch => batch.set(ref, {
              demo: true,
              uid: p.uid,
              userName: p.name,
              mode: 'individual',
              sessionId: `demo_${p.uid}_${i}`,
              score: perQuiz,
              totalQuestions: 10,
              correctCount: Math.round((p.avg / 100) * 10),
              avgPercent: p.avg,
              completedAt: serverTimestamp()
            }));
          }
        }
        await commitBatch(quizOps);

        log('Writing team leaderboard…');
        const teamOps = TEAMS.map(t => {
          const memberScore = Math.round(t.score / t.members.length);
          const ref = doc(db, 'sessions', t.id);
          return batch => batch.set(ref, {
            demo: true,
            status: 'finished',
            teamName: t.name,
            hostEmail: `${t.host.split(' ')[0].toLowerCase()}@learnloop.lk`,
            members: t.members.map((name, i) => ({
              name,
              email: `${name.split(' ')[0].toLowerCase()}@learnloop.lk`,
              score: memberScore,
              isHost: i === 0
            })),
            finishedAt: serverTimestamp()
          });
        });
        await commitBatch(teamOps);

        log('Writing testimonials…');
        const testimonialOps = TESTIMONIALS.map(t => {
          const ref = doc(collection(db, 'testimonials'));
          return batch => batch.set(ref, { ...t, demo: true, createdAt: serverTimestamp() });
        });
        await commitBatch(testimonialOps);

        log('\n✓ Demo data loaded successfully!');
        log('  • 1,180 students · 7,420 sessions · 286 goals');
        log('  • 8 Sri Lankan students · 6 local study teams');
        log('  • 6 testimonials · 10 quiz questions');
        log('\nOpen index.html to present.');
        logEl.className = 'log ok';
      } catch (err) {
        log('\nError: ' + err.message);
        logEl.className = 'log err';
      }

      btn.disabled = false;
    }

    btn.addEventListener('click', runSeed);
