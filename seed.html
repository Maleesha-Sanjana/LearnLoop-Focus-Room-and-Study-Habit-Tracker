<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seed Quiz - LearnLoop</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 60px auto; padding: 0 20px; text-align: center; }
    .ok { color: #065f46; background: #ecfdf5; padding: 16px; border-radius: 12px; margin-top: 20px; }
    .err { color: #991b1b; background: #fef2f2; padding: 16px; border-radius: 12px; margin-top: 20px; }
    a { color: #111; font-weight: 600; }
  </style>
</head>
<body>
  <h1>Upload quiz questions to database</h1>
  <p id="status">Checking login…</p>
  <p id="next" style="display:none"><a href="focusroom.html">Go to Focus Room →</a></p>

  <script type="module">
    import { auth } from './js/firebase.js';
    import { doc, setDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
    import { db } from './js/firebase.js';

    const status = document.getElementById('status');

    async function run() {
      await auth.authStateReady();
      if (!auth.currentUser) {
        status.innerHTML = 'Please <a href="login.html">log in</a> first, then open this page again.';
        status.className = 'err';
        return;
      }

      try {
        status.textContent = 'Loading questions from data/quiz-questions.json…';
        const res = await fetch('data/quiz-questions.json');
        if (!res.ok) throw new Error('Could not load data/quiz-questions.json');
        const questions = await res.json();
        if (!Array.isArray(questions) || !questions.length) {
          throw new Error('Quiz questions file is empty.');
        }

        await setDoc(doc(db, 'quizSets', 'default'), {
          questions,
          updatedAt: serverTimestamp()
        });

        status.textContent = `Done! ${questions.length} questions saved to Firestore (quizSets/default). Focus Room will load from the database.`;
        status.className = 'ok';
        document.getElementById('next').style.display = 'block';
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
        status.className = 'err';
      }
    }

    run();
  </script>
</body>
</html>
