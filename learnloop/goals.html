<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnLoop – Goals</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<button class="hamburger">☰</button>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>🎓</span> LearnLoop</div>
    <nav>
      <a href="index.html"><span class="icon">📊</span> Dashboard</a>
      <a href="tracker.html"><span class="icon">📚</span> Study Tracker</a>
      <a href="goals.html" class="active"><span class="icon">🥅</span> Goals</a>
      <a href="analytics.html"><span class="icon">📈</span> Analytics</a>
      <a href="focus-room.html"><span class="icon">🧠</span> Focus Rooms</a>
      <a href="profile.html"><span class="icon">🙍</span> Profile</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">🔓  Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1>🥅 Goals</h1>
        <p class="text-muted">Set targets and track your academic progress.</p>
      </div>
      <button class="btn btn-primary" onclick="openGoalModal()">+ New Goal</button>
    </div>

    <!-- Filter Tabs -->
    <div class="flex gap-2 mb-2" style="flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" id="filter-all" onclick="filterGoals('all')">All</button>
      <button class="btn btn-secondary btn-sm" id="filter-active" onclick="filterGoals('active')">Active</button>
      <button class="btn btn-secondary btn-sm" id="filter-completed" onclick="filterGoals('completed')">Completed</button>
    </div>

    <!-- Goals Grid -->
    <div id="goals-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;">
      <p class="text-muted">Loading goals…</p>
    </div>
  </main>
</div>

<!-- Goal Modal -->
<div class="modal-overlay" id="goal-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">New Goal</div>
      <button class="modal-close" onclick="closeGoalModal()">×</button>
    </div>
    <form onsubmit="saveGoal(event)">
      <input type="hidden" id="goal-id" />
      <div class="form-group">
        <label>Goal Title</label>
        <input type="text" id="goal-title" placeholder="e.g. Study 3 hours daily" required />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="goal-type">
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="longterm">Long-term</option>
        </select>
      </div>
      <div class="form-group">
        <label>Target Hours</label>
        <input type="number" id="goal-hours" min="0.5" step="0.5" placeholder="e.g. 3" required />
      </div>
      <div class="form-group">
        <label>Deadline</label>
        <input type="date" id="goal-deadline" />
      </div>
      <div class="form-group">
        <label>Subject (optional)</label>
        <input type="text" id="goal-subject" placeholder="e.g. Mathematics" />
      </div>
      <button type="submit" class="btn btn-primary w-full">Save Goal</button>
    </form>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/goals.js"></script>
</body>
</html>
