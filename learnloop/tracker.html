<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnLoop – Study Tracker</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<button class="hamburger">☰</button>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>🎓</span> LearnLoop</div>
    <nav>
      <a href="index.html"><span class="icon">📊</span> Dashboard</a>
      <a href="tracker.html" class="active"><span class="icon">📚</span> Study Tracker</a>
      <a href="goals.html"><span class="icon">🥅</span> Goals</a>
      <a href="analytics.html"><span class="icon">📈</span> Analytics</a>
      <a href="focus-room.html"><span class="icon">🧠</span> Focus Rooms</a>
      <a href="profile.html"><span class="icon">🙍</span> Profile</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">🔓Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <h1>📚 Study Tracker</h1>
      <p class="text-muted">Track your study sessions and build consistent habits.</p>
    </div>

    <div class="grid-2">
      <!-- Timer Card -->
      <div class="card">
        <div class="card-title">Live Timer</div>

        <div class="form-group mt-2">
          <label>Subject</label>
          <select id="timer-subject">
            <option value="">Loading subjects…</option>
          </select>
        </div>

        <div class="timer-display" id="timer-display">00:00</div>

        <div class="timer-controls">
          <button class="btn btn-primary btn-lg" id="btn-start" onclick="startTimer()">▶ Start</button>
          <button class="btn btn-danger btn-lg hidden" id="btn-stop" onclick="stopTimer()">⏹ Stop & Save</button>
          <button class="btn btn-secondary btn-lg hidden" id="btn-pause" onclick="pauseTimer()">⏸ Pause</button>
        </div>

        <div class="form-group mt-2">
          <label>Notes (optional)</label>
          <textarea id="timer-notes" placeholder="What did you study?"></textarea>
        </div>
      </div>

      <!-- Manual Entry -->
      <div class="card">
        <div class="card-title">Manual Entry</div>
        <form onsubmit="saveManualSession(event)">
          <div class="form-group">
            <label>Subject</label>
            <select id="manual-subject">
              <option value="">Loading…</option>
            </select>
          </div>
          <div class="form-group">
            <label>Date</label>
            <input type="date" id="manual-date" required />
          </div>
          <div class="form-group">
            <label>Duration (minutes)</label>
            <input type="number" id="manual-duration" min="1" max="720" placeholder="e.g. 90" required />
          </div>
          <div class="form-group">
            <label>Notes</label>
            <textarea id="manual-notes" placeholder="What did you cover?"></textarea>
          </div>
          <button type="submit" class="btn btn-primary w-full">💾 Save Session</button>
        </form>
      </div>
    </div>

    <!-- Manage Subjects -->
    <div class="card mt-3">
      <div class="flex-between mb-2">
        <div class="card-title">My Subjects</div>
        <button class="btn btn-sm btn-primary" onclick="openAddSubject()">+ Add Subject</button>
      </div>
      <div id="subjects-list" class="flex gap-2" style="flex-wrap:wrap;"></div>
    </div>

    <!-- Session History -->
    <div class="card mt-3">
      <div class="flex-between mb-2">
        <div class="card-title">Session History</div>
        <select id="filter-subject" onchange="loadSessions()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;border-radius:8px;font-size:.85rem;">
          <option value="">All Subjects</option>
        </select>
      </div>
      <div id="sessions-list">
        <p class="text-muted text-center" style="padding:20px 0;">Loading sessions…</p>
      </div>
    </div>
  </main>
</div>

<!-- Add Subject Modal -->
<div class="modal-overlay" id="subject-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Subject</div>
      <button class="modal-close" onclick="closeModal('subject-modal')">×</button>
    </div>
    <div class="form-group">
      <label>Subject Name</label>
      <input type="text" id="new-subject-name" placeholder="e.g. Mathematics" />
    </div>
    <button class="btn btn-primary w-full" onclick="addSubject()">Add Subject</button>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/tracker.js"></script>
</body>
</html>
