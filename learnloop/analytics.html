<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnLoop – Analytics</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<button class="hamburger">☰</button>

<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🎓</div> LearnLoop</div>
    <nav>
      <a href="index.html"><span class="icon">📊</span> Dashboard</a>
      <a href="tracker.html"><span class="icon">📚</span> Study Tracker</a>
      <a href="goals.html"><span class="icon">🥅</span> Goals</a>
      <a href="analytics.html" class="active">📈<span class="icon"></span> Analytics</a>
      <a href="focus-room.html"><span class="icon">🧠</span> Focus Rooms</a>
      <a href="profile.html"><span class="icon">🙍</span> Profile</a>
    </nav>
    <div class="sidebar-footer"><button onclick="logout()">🔓 Logout</button></div>
  </aside>

  <main class="main-content">
    <div class="page-header flex-between">
      <div>
        <h1>📈 Analytics</h1>
        <p class="text-muted">Understand your study patterns and improve.</p>
      </div>
      <select id="range-select" onchange="loadAnalytics()" style="background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:10px;font-size:.9rem;">
        <option value="7">Last 7 Days</option>
        <option value="14">Last 14 Days</option>
        <option value="30" selected>Last 30 Days</option>
      </select>
    </div>

    <!-- Summary Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">⏱️</div>
        <div class="stat-value" id="a-total">0h</div>
        <div class="stat-label">Total Study Time</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-value" id="a-avg">0h</div>
        <div class="stat-label">Daily Average</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-value" id="a-streak">0</div>
        <div class="stat-label">Best Streak</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📚</div>
        <div class="stat-value" id="a-sessions">0</div>
        <div class="stat-label">Total Sessions</div>
      </div>
    </div>

    <div class="grid-2">
      <!-- Daily Bar Chart -->
      <div class="card">
        <div class="card-title">Daily Study Hours</div>
        <div class="chart-container">
          <canvas id="chart-daily"></canvas>
        </div>
      </div>

      <!-- Subject Pie Chart -->
      <div class="card">
        <div class="card-title">Subject Distribution</div>
        <div class="chart-container">
          <canvas id="chart-subjects"></canvas>
        </div>
      </div>
    </div>

    <!-- Insights -->
    <div class="card mt-3">
      <div class="card-title">Smart Insights 🧠</div>
      <div id="insights-list" class="mt-2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;"></div>
    </div>

    <!-- Weekly Trend -->
    <div class="card mt-3">
      <div class="card-title">Weekly Trend</div>
      <div class="chart-container">
        <canvas id="chart-trend"></canvas>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script src="js/analytics.js"></script>
</body>
</html>
