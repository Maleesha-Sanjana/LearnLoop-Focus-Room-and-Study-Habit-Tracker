<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnLoop – Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🎓 LearnLoop</div>
    <p class="auth-subtitle">Your personalized study companion</p>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Login</button>
      <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" value="test@gmail.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" value="test123" required />
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg">Login</button>
    </form>

    <!-- Register Form -->
    <form id="register-form" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Your name" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" required minlength="6" />
      </div>
      <div class="form-group">
        <label>Study Goal</label>
        <select id="reg-goal">
          <option value="school">School Student</option>
          <option value="university">University Student</option>
          <option value="self">Self-Learner</option>
          <option value="exam">Competitive Exam</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary w-full btn-lg">Create Account</button>
    </form>

    <p class="text-center text-muted mt-2" style="font-size:0.85rem;">
      By continuing you agree to our <a href="#">Terms of Service</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
